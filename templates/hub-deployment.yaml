apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-hub
  labels:
    {{- include "kubenest.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  replicas: {{ .Values.hub.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: hub
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: hub
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: hub
          image: "{{ .Values.hub.image.repository }}:{{ .Values.hub.image.tag }}"
          imagePullPolicy: {{ .Values.hub.image.pullPolicy }}
          ports:
            - name: ws
              containerPort: 8001
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwt-secret
            - name: REDIS_URL
              value: "redis://{{ include "kubenest.redis.host" . }}:6379/0"
            - name: WS_PING_INTERVAL
              value: "30s"
            - name: WS_PONG_TIMEOUT
              value: "60s"
          readinessProbe:
            httpGet:
              path: /ready
              port: ws
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.hub.resources | nindent 12 }}
