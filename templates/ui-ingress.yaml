{{- if .Values.ui.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    {{- include "kubenest.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- with .Values.ui.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ include "kubenest.ui.host" . }}
      secretName: {{ .Release.Name }}-ui-tls
  rules:
    - host: {{ include "kubenest.ui.host" . }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-ui
                port:
                  number: 3000
{{- end }}
