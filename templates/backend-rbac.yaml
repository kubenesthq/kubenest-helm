apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "kubenest.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "kubenest.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [kubenest-operator-token]
    verbs: [get, update, patch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
  # Provisioning: launch K8s Jobs and read pod logs
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [create, get, list, watch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  # ArgoCD: manage Applications for workload deployments
  - apiGroups: [argoproj.io]
    resources: [applications]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "kubenest.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-backend
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-backend
    namespace: {{ .Release.Namespace }}
