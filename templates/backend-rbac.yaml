apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "kubenest.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "kubenest.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [kubenest-operator-token]
    verbs: [get, update, patch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "kubenest.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-backend
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-backend
    namespace: {{ .Release.Namespace }}
