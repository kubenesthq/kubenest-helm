# -- Domain for ingress resources (e.g. kubenest.example.com)
domain: "kubenest.example.com"

# -- Image pull secrets for private registries (e.g. ghcr.io)
# Create with: kubectl create secret docker-registry ghcr-creds -n kubenest-system --docker-server=ghcr.io --docker-username=<user> --docker-password=<pat>
imagePullSecrets: []
# - name: ghcr-creds

# -- Shared JWT secret for backend <-> hub <-> operator auth
# Generate with: openssl rand -hex 32
jwtSecret: ""

# -- Namespace for kubenest (usually set via helm install -n)
# namespace: kubenest-system

# --- Backend (FastAPI) ---
backend:
  image:
    repository: ghcr.io/kubenesthq/kubenest-backend
    tag: "latest"
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    # -- Override hostname (default: api.<domain>)
    host: ""
    annotations: {}
  # -- Initial admin user
  admin:
    email: "admin@kubenest.io"
    password: "changeme"

# --- Hub (Go WebSocket relay) ---
hub:
  image:
    repository: ghcr.io/kubenesthq/kubenest-hub
    tag: "latest"
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  ingress:
    enabled: true
    # -- Override hostname (default: hub.<domain>)
    host: ""
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.org/websocket-services: "{{ .Release.Name }}-hub"

# --- UI (Next.js) ---
ui:
  image:
    repository: ghcr.io/kubenesthq/kubenest-ui
    tag: "latest"
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  ingress:
    enabled: true
    # -- Override hostname (default: app.<domain>)
    host: ""
    annotations: {}

# --- Operator (optional subchart — disable if operator already installed separately) ---
operator:
  enabled: true

# -- Operator subchart values (passed to kubenest-operator-2 via alias)
operator-chart:
  image:
    repository: ghcr.io/kubenesthq/operatorv2
    tag: "latest"
    pullPolicy: Always
  serviceAccount:
    create: true
  rbac:
    create: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  bootstrap:
    argocd:
      enabled: true
    certManager:
      enabled: false
    ingressNginx:
      enabled: false
    vault:
      enabled: false

# --- PostgreSQL (Bitnami) ---
postgresql:
  enabled: true
  auth:
    username: kubenest
    password: ""
    database: kubenest
  primary:
    persistence:
      size: 5Gi

# --- Redis (Bitnami) ---
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 1Gi
